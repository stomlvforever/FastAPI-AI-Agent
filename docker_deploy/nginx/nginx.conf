# Nginx 反向代理配置
#
# 作用：
# 1. 客户端 → Nginx(80) → Frontend(80) / FastAPI(8000)
# 2. /api、/docs 等请求转发给后端
# 3. React SPA 页面请求转发给 frontend 容器
# 4. /api/v1/agent/chat/stream 开启 SSE 无缓冲代理
# 5. /static/avatars/ 由 Nginx 直接服务，不经过 Python

upstream fastapi_app {
    # Docker 内部网络中，app 是 FastAPI 容器的服务名
    server app:8000;
}

upstream frontend_app {
    # Docker 内部网络中，frontend 是 React 容器的服务名
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # 最大上传文件大小（头像上传需要）
    client_max_body_size 5M;

    # Agent SSE 流式接口：关闭代理缓冲，否则前端会感觉不到“流”
    location = /api/v1/agent/chat/stream {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    # API / Swagger / ReDoc / OpenAPI 都走后端
    location /api/ {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 支持（如果后面补实时功能，这里直接可用）
    location /api/v1/ws {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 静态文件（头像）直接由 Nginx 服务，不经过 Python
    location /static/avatars/ {
        alias /app/uploads/avatars/;
        expires 7d;           # 浏览器缓存 7 天
        access_log off;       # 不记录静态文件访问日志
    }

    # 其余页面请求都交给前端容器（React SPA）
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
